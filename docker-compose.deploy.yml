services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID}
    restart: unless-stopped
    environment:
      AIRFOILFOAM_REDIS_URL: redis://redis:6379/0
      AIRFOILFOAM_DATA_DIR: /data/airfoilfoam
      AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID}
      AIRFOILFOAM_ENABLED_ENGINE_KEYS: ${AIRFOILFOAM_ENABLED_ENGINE_KEYS:-openfoam:opencfd:2606:numerics-1:adapter-1}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX: ${AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX:-solver-evidence/v1}
      AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL: ${AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL:-10}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      AIRFOILFOAM_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_DIR: /data/airfoilfoam/evidence-hydration-cache
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB:-50}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS:-86400}
      AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS: ${AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS:-900}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - results:/data/airfoilfoam
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID}
    restart: unless-stopped
    environment:
      AIRFOILFOAM_REDIS_URL: redis://redis:6379/0
      AIRFOILFOAM_DATA_DIR: /data/airfoilfoam
      AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID}
      AIRFOILFOAM_OPENFOAM_RUNNER: local
      AIRFOILFOAM_ENGINE_FAMILY: openfoam
      AIRFOILFOAM_ENGINE_DISTRIBUTION: opencfd
      AIRFOILFOAM_ENGINE_VERSION: "2606"
      AIRFOILFOAM_ENGINE_NUMERICS_REVISION: "1"
      AIRFOILFOAM_ENGINE_ADAPTER_CONTRACT_VERSION: "1"
      AIRFOILFOAM_ENGINE_SOURCE_REVISION: 481094fdf34f11ed6d0d603ee59a858a0124236d
      AIRFOILFOAM_CELERY_QUEUE: openfoam-opencfd-2606
      AIRFOILFOAM_ENGINE_IMAGE_DIGEST: ${OPENCFD2606_IMAGE_DIGEST:-}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX: ${AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX:-solver-evidence/v1}
      AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL: ${AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL:-10}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      AIRFOILFOAM_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_DIR: /data/airfoilfoam/evidence-hydration-cache
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB:-50}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS:-86400}
      AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS: ${AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS:-900}
      AIRFOILFOAM_WORKER_CPU_BUDGET: ${AIRFOILFOAM_WORKER_CPU_BUDGET:-8}
      AIRFOILFOAM_CASE_CONCURRENCY: ${AIRFOILFOAM_CASE_CONCURRENCY:-8}
      AIRFOILFOAM_CELERY_CONCURRENCY: ${AIRFOILFOAM_CELERY_CONCURRENCY:-8}
      AIRFOILFOAM_CPU_TOKEN_STATE_PATH: /data/airfoilfoam-runtime/cpu-tokens.json
      AIRFOILFOAM_RANS_SOLVER_TIMEOUT: ${AIRFOILFOAM_RANS_SOLVER_TIMEOUT:-1200}
      AIRFOILFOAM_RANS_MAX_ITERATIONS: ${AIRFOILFOAM_RANS_MAX_ITERATIONS:-600}
    volumes:
      - results:/data/airfoilfoam
      - engine_runtime:/data/airfoilfoam-runtime
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "8"

  # Optional production Foundation 14 pool. It is excluded from ordinary
  # deploys and must be enabled through the guarded engine-maintenance path
  # with COMPOSE_PROFILES=foundation14 and the matching gateway engine key.
  worker-foundation14:
    profiles: ["foundation14"]
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-foundation14
      args:
        AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID}
    restart: unless-stopped
    environment:
      AIRFOILFOAM_REDIS_URL: redis://redis:6379/0
      AIRFOILFOAM_DATA_DIR: /data/airfoilfoam
      AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID}
      AIRFOILFOAM_OPENFOAM_RUNNER: local
      AIRFOILFOAM_ENGINE_FAMILY: openfoam
      AIRFOILFOAM_ENGINE_DISTRIBUTION: foundation
      AIRFOILFOAM_ENGINE_VERSION: "14"
      AIRFOILFOAM_ENGINE_NUMERICS_REVISION: "1"
      AIRFOILFOAM_ENGINE_ADAPTER_CONTRACT_VERSION: "1"
      AIRFOILFOAM_CELERY_QUEUE: openfoam-foundation-14
      AIRFOILFOAM_ENGINE_SOURCE_REVISION: b4f91ad8bbbab628441562fc419f040cc4796f11
      AIRFOILFOAM_WORKER_CPU_BUDGET: ${AIRFOILFOAM_WORKER_CPU_BUDGET:-8}
      AIRFOILFOAM_CASE_CONCURRENCY: ${AIRFOILFOAM_CASE_CONCURRENCY:-8}
      AIRFOILFOAM_CELERY_CONCURRENCY: ${AIRFOILFOAM_CELERY_CONCURRENCY:-8}
      AIRFOILFOAM_CPU_TOKEN_STATE_PATH: /data/airfoilfoam-runtime/cpu-tokens.json
      AIRFOILFOAM_RANS_SOLVER_TIMEOUT: ${AIRFOILFOAM_RANS_SOLVER_TIMEOUT:-1200}
      AIRFOILFOAM_RANS_MAX_ITERATIONS: ${AIRFOILFOAM_RANS_MAX_ITERATIONS:-600}
      AIRFOILFOAM_ENGINE_IMAGE_DIGEST: ${FOUNDATION14_IMAGE_DIGEST:-}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX: ${AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX:-solver-evidence/v1}
      AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL: ${AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL:-10}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      AIRFOILFOAM_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_DIR: /data/airfoilfoam/evidence-hydration-cache
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB:-50}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS:-86400}
      AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS: ${AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS:-900}
    volumes:
      - results:/data/airfoilfoam
      - engine_runtime:/data/airfoilfoam-runtime
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "8"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aerodb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aerodb
    ports:
      - "127.0.0.1:5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerodb"]
      interval: 5s
      timeout: 3s
      retries: 10

  # A nested writable sync-imports volume needs its mountpoint to exist in the
  # parent results volume before node-api mounts that parent read-only. This is
  # essential after `down -v`, when the results volume is brand new.
  storage-init:
    image: alpine:3.20
    restart: "no"
    command: ["sh", "-ec", "install -d -m 0755 /data/airfoilfoam/sync-imports"]
    volumes:
      - results:/data/airfoilfoam

  node-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    restart: unless-stopped
    command: sh -c "pnpm --filter @aerodb/db migrate && pnpm --filter @aerodb/db seed && pnpm --filter @aerodb/api start"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENGINE_URL: ${ENGINE_URL}
      ENGINE_EXPECTED_BUILD_ID: ${ENGINE_EXPECTED_BUILD_ID}
      ENGINE_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      MEDIA_DIR: ${MEDIA_DIR}
      API_PORT: "4000"
      API_HOST: 0.0.0.0
      NODE_ENV: production
      ADMIN_AUTH_REQUIRED: ${ADMIN_AUTH_REQUIRED}
      ADMIN_AUTH_DISABLED: ${ADMIN_AUTH_DISABLED}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_GOOGLE_CLIENT_ID: ${ADMIN_GOOGLE_CLIENT_ID}
      ADMIN_GOOGLE_CLIENT_SECRET: ${ADMIN_GOOGLE_CLIENT_SECRET}
      ADMIN_GOOGLE_ALLOWED_DOMAIN: ${ADMIN_GOOGLE_ALLOWED_DOMAIN}
      ADMIN_GOOGLE_REDIRECT_URI: ${ADMIN_GOOGLE_REDIRECT_URI}
      ADMIN_PUBLIC_ORIGIN: ${ADMIN_PUBLIC_ORIGIN}
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - results:/data/airfoilfoam:ro
      # Sync imports (remote-solver pushes) are the ONE path node-api must
      # WRITE under the media root; a dedicated volume nested at that path
      # keeps engine data read-only (validation incident 2026-07-11: pushed
      # media failed EROFS/ENOENT on the ro mount).
      - sync_imports:/data/airfoilfoam/sync-imports
    depends_on:
      postgres:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e ''fetch("http://127.0.0.1:4000/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))''',
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    restart: unless-stopped
    command: sh -c "pnpm --filter @aerodb/web build && pnpm --filter @aerodb/web start"
    environment:
      API_URL: ${API_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    ports:
      - "127.0.0.1:3100:3100"
    depends_on:
      node-api:
        condition: service_healthy

  sweeper:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    restart: unless-stopped
    command: sh -c "pnpm --filter @aerodb/sweeper start"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENGINE_URL: ${ENGINE_URL}
      MEDIA_DIR: ${MEDIA_DIR}
      AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      ENGINE_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      # Keep Node admission in the same logical-CPU units as the worker's
      # durable token pool. sweeper_state max_concurrent_jobs=0 means auto.
      AIRFOILFOAM_WORKER_CPU_BUDGET: ${AIRFOILFOAM_WORKER_CPU_BUDGET:-8}
    volumes:
      - results:/data/airfoilfoam
      - sync_imports:/data/airfoilfoam/sync-imports # GC crash-orphan sync uploads
    depends_on:
      postgres:
        condition: service_healthy
      node-api:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully

  # Default-media rendering is durable output work. It intentionally has its
  # own control-plane process so large VTK/animation renders cannot delay the
  # scheduler from submitting independent CFD work to otherwise-idle cores.
  media-repair:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    restart: unless-stopped
    command: sh -c "pnpm --filter @aerodb/sweeper media-repair"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENGINE_URL: ${ENGINE_URL}
      MEDIA_DIR: ${MEDIA_DIR}
      AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      ENGINE_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
    volumes:
      - results:/data/airfoilfoam
      - sync_imports:/data/airfoilfoam/sync-imports
    depends_on:
      postgres:
        condition: service_healthy
      node-api:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully

volumes:
  results:
  sync_imports:
  pgdata:
  engine_runtime:
