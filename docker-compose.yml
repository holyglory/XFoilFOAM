services:
  # ===================== CFD solver service (Python / OpenFOAM) =====================
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID:-dev-20260704-batch-cache}
    environment:
      AIRFOILFOAM_REDIS_URL: redis://redis:6379/0
      AIRFOILFOAM_DATA_DIR: /data/airfoilfoam
      AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID:-dev-20260704-batch-cache}
      # Registered adapters are not schedulable merely because their code is
      # present. Enable Foundation 14 only together with its optional worker:
      # AIRFOILFOAM_ENABLED_ENGINE_KEYS=openfoam:opencfd:2606:numerics-1:adapter-1,openfoam:foundation:14:numerics-1:adapter-1
      AIRFOILFOAM_ENABLED_ENGINE_KEYS: ${AIRFOILFOAM_ENABLED_ENGINE_KEYS:-openfoam:opencfd:2606:numerics-1:adapter-1}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX: ${AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX:-solver-evidence/v1}
      AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL: ${AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL:-10}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      AIRFOILFOAM_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_DIR: /data/airfoilfoam/evidence-hydration-cache
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB:-50}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS:-86400}
      AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS: ${AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS:-900}
      # Same cache location + cap as the worker so GET /cache/stats reports the
      # real store; the API only reads it (stats), hence the :ro mount below.
      AIRFOILFOAM_CACHE_DIR: /data/airfoilfoam-cache
      AIRFOILFOAM_CACHE_MAX_GB: "20"
    ports:
      - "8000:8000"
    volumes:
      - results:/data/airfoilfoam
      - engine_cache:/data/airfoilfoam-cache:ro
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID:-dev-20260704-batch-cache}
    ulimits:
      nofile:
        soft: 65536
        hard: 524288
    environment:
      AIRFOILFOAM_REDIS_URL: redis://redis:6379/0
      AIRFOILFOAM_DATA_DIR: /data/airfoilfoam
      AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID:-dev-20260704-batch-cache}
      AIRFOILFOAM_OPENFOAM_RUNNER: local
      AIRFOILFOAM_ENGINE_FAMILY: openfoam
      AIRFOILFOAM_ENGINE_DISTRIBUTION: opencfd
      AIRFOILFOAM_ENGINE_VERSION: "2606"
      AIRFOILFOAM_ENGINE_NUMERICS_REVISION: "1"
      AIRFOILFOAM_ENGINE_ADAPTER_CONTRACT_VERSION: "1"
      AIRFOILFOAM_ENGINE_SOURCE_REVISION: 481094fdf34f11ed6d0d603ee59a858a0124236d
      AIRFOILFOAM_CELERY_QUEUE: openfoam-opencfd-2606
      AIRFOILFOAM_ENGINE_IMAGE_DIGEST: ${OPENCFD2606_IMAGE_DIGEST:-}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX: ${AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX:-solver-evidence/v1}
      AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL: ${AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL:-10}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      AIRFOILFOAM_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_DIR: /data/airfoilfoam/evidence-hydration-cache
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB:-50}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS:-86400}
      AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS: ${AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS:-900}
      AIRFOILFOAM_WORKER_CPU_BUDGET: "18"
      AIRFOILFOAM_CASE_CONCURRENCY: "18"
      AIRFOILFOAM_CELERY_CONCURRENCY: "18"
      # All engine worker containers share one admission-token ledger. Starting
      # the optional Foundation worker therefore cannot double the CPU budget.
      AIRFOILFOAM_CPU_TOKEN_STATE_PATH: /data/airfoilfoam-runtime/cpu-tokens.json
      AIRFOILFOAM_RANS_SOLVER_TIMEOUT: "1200"
      AIRFOILFOAM_RANS_MAX_ITERATIONS: "600"
      # Persistent cross-job mesh + steady-solution-seed cache (LRU, size-capped).
      AIRFOILFOAM_CACHE_DIR: /data/airfoilfoam-cache
      AIRFOILFOAM_CACHE_MAX_GB: "20"
    volumes:
      - results:/data/airfoilfoam
      - engine_cache:/data/airfoilfoam-cache
      - engine_runtime:/data/airfoilfoam-runtime
    depends_on:
      redis:
        condition: service_healthy
    # CFD is CPU heavy; raise/lower to taste.
    deploy:
      resources:
        limits:
          cpus: "18"

  # OpenFOAM Foundation 14 is an opt-in, independently rollable runtime. The
  # API routes its exact engine identity to this queue; the default OpenCFD
  # worker never consumes it. Start it with `--profile foundation14` and enable
  # the matching AIRFOILFOAM_ENABLED_ENGINE_KEYS entry on the API service.
  worker-foundation14:
    profiles: ["foundation14"]
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-foundation14
      args:
        AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID:-dev-20260704-batch-cache}
    ulimits:
      nofile:
        soft: 65536
        hard: 524288
    environment:
      AIRFOILFOAM_REDIS_URL: redis://redis:6379/0
      AIRFOILFOAM_DATA_DIR: /data/airfoilfoam
      AIRFOILFOAM_BUILD_ID: ${AIRFOILFOAM_BUILD_ID:-dev-20260704-batch-cache}
      AIRFOILFOAM_OPENFOAM_RUNNER: local
      AIRFOILFOAM_ENGINE_FAMILY: openfoam
      AIRFOILFOAM_ENGINE_DISTRIBUTION: foundation
      AIRFOILFOAM_ENGINE_VERSION: "14"
      AIRFOILFOAM_ENGINE_NUMERICS_REVISION: "1"
      AIRFOILFOAM_ENGINE_ADAPTER_CONTRACT_VERSION: "1"
      AIRFOILFOAM_CELERY_QUEUE: openfoam-foundation-14
      AIRFOILFOAM_ENGINE_SOURCE_REVISION: b4f91ad8bbbab628441562fc419f040cc4796f11
      AIRFOILFOAM_ENGINE_IMAGE_DIGEST: ${FOUNDATION14_IMAGE_DIGEST:-}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX: ${AIRFOILFOAM_EVIDENCE_OBJECT_PREFIX:-solver-evidence/v1}
      AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL: ${AIRFOILFOAM_EVIDENCE_ZSTD_LEVEL:-10}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      AIRFOILFOAM_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_DIR: /data/airfoilfoam/evidence-hydration-cache
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_MAX_GB:-50}
      AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS: ${AIRFOILFOAM_EVIDENCE_HYDRATION_CACHE_TTL_SECONDS:-86400}
      AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS: ${AIRFOILFOAM_EVIDENCE_GCS_TIMEOUT_SECONDS:-900}
      AIRFOILFOAM_WORKER_CPU_BUDGET: "18"
      AIRFOILFOAM_CASE_CONCURRENCY: "18"
      AIRFOILFOAM_CELERY_CONCURRENCY: "18"
      AIRFOILFOAM_CPU_TOKEN_STATE_PATH: /data/airfoilfoam-runtime/cpu-tokens.json
      AIRFOILFOAM_RANS_SOLVER_TIMEOUT: "1200"
      AIRFOILFOAM_RANS_MAX_ITERATIONS: "600"
      AIRFOILFOAM_CACHE_DIR: /data/airfoilfoam-cache
      AIRFOILFOAM_CACHE_MAX_GB: "20"
    volumes:
      - results:/data/airfoilfoam
      - engine_cache:/data/airfoilfoam-cache
      - engine_runtime:/data/airfoilfoam-runtime
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "18"

  # ===================== Airfoils.Pro control-plane (Node) + database =====================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aerodb
      POSTGRES_PASSWORD: aerodb
      POSTGRES_DB: aerodb
    ports:
      - "5544:5432" # host:container — 5544 avoids clashing with a local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerodb"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The nested writable import volume needs this mountpoint in the parent
  # results volume before node-api mounts that parent read-only after a reset.
  storage-init:
    image: alpine:3.20
    restart: "no"
    command: ["sh", "-ec", "install -d -m 0755 /data/airfoilfoam/sync-imports"]
    volumes:
      - results:/data/airfoilfoam

  node-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    # migrate + seed (idempotent) then serve the control-plane API
    command: sh -c "pnpm --filter @aerodb/db migrate && pnpm --filter @aerodb/db seed && pnpm --filter @aerodb/api start"
    environment:
      DATABASE_URL: postgres://aerodb:aerodb@postgres:5432/aerodb
      ENGINE_URL: http://api:8000
      ENGINE_EXPECTED_BUILD_ID: ${AIRFOILFOAM_BUILD_ID:-dev-20260704-batch-cache}
      ENGINE_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      MEDIA_DIR: /data/airfoilfoam
      API_PORT: "4000"
      API_HOST: 0.0.0.0
    ports:
      - "4000:4000"
    volumes:
      - results:/data/airfoilfoam:ro # serve CFD images/videos the Python engine writes
      - sync_imports:/data/airfoilfoam/sync-imports
    depends_on:
      postgres:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    command: sh -c "pnpm --filter @aerodb/web exec next dev -H 0.0.0.0 -p 3100"
    environment:
      API_URL: http://node-api:4000 # server-side fetches (SSR)
      NEXT_PUBLIC_API_URL: http://localhost:4000 # browser fetches (sim modal, media)
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3100:3100"
    depends_on:
      - node-api

  # Continuous CFD sweeper — gated by the sweeper_state row (DISABLED by default).
  # It idles (reconcile-only) until enabled via PATCH /api/sweeper; once on it
  # enqueues PolarRequests to the Python `api` and ingests solved results +
  # media into Postgres. Enabling it requires the CFD engine (api + worker) up.
  sweeper:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    command: sh -c "pnpm --filter @aerodb/sweeper start"
    environment:
      DATABASE_URL: postgres://aerodb:aerodb@postgres:5432/aerodb
      ENGINE_URL: http://api:8000
      AIRFOILFOAM_EVIDENCE_BUCKET: ${AIRFOILFOAM_EVIDENCE_BUCKET:-}
      AIRFOILFOAM_EVIDENCE_REMOTE_ONLY: ${AIRFOILFOAM_EVIDENCE_REMOTE_ONLY:-false}
      ENGINE_CONTROL_PLANE_TOKEN: ${AIRFOILFOAM_CONTROL_PLANE_TOKEN:-}
    volumes:
      - results:/data/airfoilfoam # ingest reads engine artifacts
      - sync_imports:/data/airfoilfoam/sync-imports # GC crash-orphan sync uploads
    depends_on:
      postgres:
        condition: service_healthy
      node-api:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully

volumes:
  results:
  sync_imports:
  pgdata:
  engine_cache: # persistent engine mesh/seed cache (survives worker image rebuilds)
  engine_runtime: # cross-worker CPU-token admission state
