name: Deploy Airfoils.Pro VPS

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      pending_cutover_node_api_repair:
        description: "Repair only Node API while a pre-attestation OpenCFD 2606 cutover is pending"
        required: false
        default: false
        type: boolean
      pending_cutover_engine_rebuild_replay:
        description: "Replay the exact same-build OpenCFD 2606 cutover after the maintenance queue-timeout repair"
        required: false
        default: false
        type: boolean
      pending_cutover_retention_retry:
        description: "Retry the exact failed OpenCFD 2606 canary with the reviewed mesh-evidence retention correction"
        required: false
        default: false
        type: boolean
      pending_cutover_transient_retention_retry:
        description: "Retry the second exact failed OpenCFD 2606 canary with the reviewed transient-retention correction"
        required: false
        default: false
        type: boolean
      pending_cutover_early_stop_retention_retry:
        description: "Retry the third exact failed OpenCFD 2606 canary with the reviewed URANS early-stop retention correction"
        required: false
        default: false
        type: boolean

concurrency:
  group: airfoils-pro-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy control plane
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && (inputs.pending_cutover_retention_retry || inputs.pending_cutover_transient_retention_retry || inputs.pending_cutover_early_stop_retention_retry) && 360 || (github.event_name == 'workflow_dispatch' && inputs.pending_cutover_engine_rebuild_replay && 360 || 45) }}
    env:
      VPS_HOST: ${{ secrets.AIRFOILS_VPS_HOST }}
      VPS_USER: ${{ secrets.AIRFOILS_VPS_USER }}
      VPS_PORT: ${{ secrets.AIRFOILS_VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.AIRFOILS_VPS_SSH_KEY }}
      VPS_KNOWN_HOSTS: ${{ secrets.AIRFOILS_VPS_KNOWN_HOSTS }}
      VPS_APP_DIR: ${{ vars.AIRFOILS_VPS_APP_DIR }}
      PUBLIC_ORIGIN: ${{ vars.AIRFOILS_PUBLIC_ORIGIN }}
      PENDING_CUTOVER_NODE_API_REPAIR: ${{ github.event_name == 'workflow_dispatch' && inputs.pending_cutover_node_api_repair || false }}
      PENDING_CUTOVER_ENGINE_REBUILD_REPLAY: ${{ github.event_name == 'workflow_dispatch' && inputs.pending_cutover_engine_rebuild_replay || false }}
      PENDING_CUTOVER_RETENTION_RETRY: ${{ github.event_name == 'workflow_dispatch' && inputs.pending_cutover_retention_retry || false }}
      PENDING_CUTOVER_TRANSIENT_RETENTION_RETRY: ${{ github.event_name == 'workflow_dispatch' && inputs.pending_cutover_transient_retention_retry || false }}
      PENDING_CUTOVER_EARLY_STOP_RETENTION_RETRY: ${{ github.event_name == 'workflow_dispatch' && inputs.pending_cutover_early_stop_retention_retry || false }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # The incident wrapper compares the staged source to the exact
          # failed-replay commit.  Full history is used only to produce that
          # authenticated, read-only Git-tree inventory below.
          fetch-depth: 0

      - name: Ensure deploy tools are available
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/deploy/vps-redeploy.sh
          bash -n scripts/deploy/promote-and-redeploy.sh
          bash -n scripts/deploy/repair-pending-node-api.sh
          bash -n scripts/deploy/replay-pending-opencfd2606-rebuild.sh
          bash -n scripts/deploy/retry-pending-opencfd2606-retention.sh
          bash -n scripts/deploy/retry-pending-opencfd2606-transient-retention.sh
          bash -n scripts/deploy/retry-pending-opencfd2606-early-stop-retention.sh
          python3 scripts/deploy/deployment-source-manifest.py --help >/dev/null
          test -f docker-compose.deploy.yml

      - name: Seal deployment source
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/deploy/deployment-source-manifest.py \
            --create \
            --root . \
            --manifest .deployment-source.json \
            --revision "${GITHUB_SHA}"
          python3 scripts/deploy/deployment-source-manifest.py \
            --verify \
            --root . \
            --manifest .deployment-source.json

      - name: Install SSH key
        shell: bash
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Set AIRFOILS_VPS_HOST secret}"
          : "${VPS_USER:?Set AIRFOILS_VPS_USER secret}"
          : "${VPS_SSH_KEY:?Set AIRFOILS_VPS_SSH_KEY secret}"
          : "${VPS_KNOWN_HOSTS:?Set AIRFOILS_VPS_KNOWN_HOSTS to the operator-verified pinned VPS host key}"
          if [[ -z "${VPS_PORT:-}" ]]; then
            VPS_PORT=22
          fi
          echo "VPS_PORT=$VPS_PORT" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/airfoils_pro_vps
          chmod 600 ~/.ssh/airfoils_pro_vps
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          KNOWN_HOST_LOOKUP="$VPS_HOST"
          if [[ "$VPS_PORT" != "22" ]]; then
            KNOWN_HOST_LOOKUP="[$VPS_HOST]:$VPS_PORT"
          fi
          ssh-keygen -F "$KNOWN_HOST_LOOKUP" -f ~/.ssh/known_hosts >/dev/null || {
            echo "AIRFOILS_VPS_KNOWN_HOSTS does not contain the configured host/port entry." >&2
            exit 2
          }

      - name: Ensure VPS deploy tools are available
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" '
            set -euo pipefail
            if command -v rsync >/dev/null 2>&1; then
              exit 0
            fi
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y rsync
            elif command -v apk >/dev/null 2>&1; then
              sudo apk add --no-cache rsync
            else
              echo "rsync is required on the VPS, and no supported package manager was found." >&2
              exit 12
            fi
          '

      - name: Prepare unique VPS staging directory
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="${VPS_APP_DIR:-/opt/airfoils-pro/app}"
          STAGING_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA}"
          [[ "$STAGING_ID" =~ ^[0-9]+-[0-9]+-[0-9a-f]{40}$ ]]
          STAGING_DIR="$(dirname "$APP_DIR")/deploy-staging/$STAGING_ID"
          printf 'VPS_STAGING_DIR=%s\n' "$STAGING_DIR" >> "$GITHUB_ENV"
          printf -v STAGING_Q '%q' "$STAGING_DIR"
          ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "install -d -m 700 -- $STAGING_Q"

      - name: Upload source to isolated VPS staging
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/airfoils_pro_vps -p ${VPS_PORT}" \
            --exclude-from scripts/deploy/source-rsync-excludes.txt \
            ./ "${VPS_USER}@${VPS_HOST}:${VPS_STAGING_DIR}/"

      - name: Upload exact failed-replay source inventory for retention retry
        if: ${{ env.PENDING_CUTOVER_RETENTION_RETRY == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_REVISION="1f815f89c523cbf667725c1cd681d729c06a10c9"
          EXPECTED_INVENTORY_SHA256="168acd3453ae8472ed841ed390f455902267e27f2c47ba15c182f94f3b52fb01"
          INVENTORY="$RUNNER_TEMP/opencfd2606-retention-base-ls-tree.txt"
          git cat-file -e "${BASE_REVISION}^{commit}"
          git ls-tree -r --full-tree "$BASE_REVISION" >"$INVENTORY"
          printf '%s  %s\n' "$EXPECTED_INVENTORY_SHA256" "$INVENTORY" | sha256sum -c -
          printf -v STAGING_Q '%q' "$VPS_STAGING_DIR"
          REMOTE_INVENTORY="$VPS_STAGING_DIR/.codex-artifacts/opencfd2606-retention-base-ls-tree.txt"
          printf -v REMOTE_INVENTORY_Q '%q' "$REMOTE_INVENTORY"
          ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "install -d -m 700 -- $STAGING_Q/.codex-artifacts && umask 077 && cat >$REMOTE_INVENTORY_Q && chmod 600 -- $REMOTE_INVENTORY_Q" \
            <"$INVENTORY"

      - name: Upload exact source inventories for transient-retention retry
        if: ${{ env.PENDING_CUTOVER_TRANSIENT_RETENTION_RETRY == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_REVISION="cd0967a1ba4ef82113d6b1eae9e38f0a7baec3a2"
          EXPECTED_BASE_INVENTORY_SHA256="cc5b8cb9a48f18729ce9cffa73783c64e5aa9fba244216b51c21eea28932a839"
          BASE_INVENTORY="$RUNNER_TEMP/opencfd2606-transient-retention-base-ls-tree.txt"
          TARGET_INVENTORY="$RUNNER_TEMP/opencfd2606-transient-retention-target-ls-tree.txt"
          git cat-file -e "${BASE_REVISION}^{commit}"
          git cat-file -e "${GITHUB_SHA}^{commit}"
          git ls-tree -r --full-tree "$BASE_REVISION" >"$BASE_INVENTORY"
          git ls-tree -r --full-tree "$GITHUB_SHA" >"$TARGET_INVENTORY"
          printf '%s  %s\n' "$EXPECTED_BASE_INVENTORY_SHA256" "$BASE_INVENTORY" | sha256sum -c -
          TARGET_INVENTORY_SHA256="$(sha256sum "$TARGET_INVENTORY" | awk '{print $1}')"
          [[ "$TARGET_INVENTORY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          printf 'PENDING_CUTOVER_TRANSIENT_RETENTION_TARGET_INVENTORY_SHA256=%s\n' "$TARGET_INVENTORY_SHA256" >>"$GITHUB_ENV"
          printf -v STAGING_Q '%q' "$VPS_STAGING_DIR"
          REMOTE_BASE="$VPS_STAGING_DIR/.codex-artifacts/opencfd2606-transient-retention-base-ls-tree.txt"
          REMOTE_TARGET="$VPS_STAGING_DIR/.codex-artifacts/opencfd2606-transient-retention-target-ls-tree.txt"
          printf -v REMOTE_BASE_Q '%q' "$REMOTE_BASE"
          printf -v REMOTE_TARGET_Q '%q' "$REMOTE_TARGET"
          ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "install -d -m 700 -- $STAGING_Q/.codex-artifacts && umask 077 && cat >$REMOTE_BASE_Q && chmod 600 -- $REMOTE_BASE_Q" \
            <"$BASE_INVENTORY"
          ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "umask 077 && cat >$REMOTE_TARGET_Q && chmod 600 -- $REMOTE_TARGET_Q" \
            <"$TARGET_INVENTORY"

      - name: Upload exact source inventories for early-stop-retention retry
        if: ${{ env.PENDING_CUTOVER_EARLY_STOP_RETENTION_RETRY == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_REVISION="2ab861cb4ce603a14b82722a0f63cbc0fd42276c"
          EXPECTED_BASE_INVENTORY_SHA256="cfc14fb3990219b323e9349a2054734ec9ef72f638d44658f50cfc89b8f258dd"
          BASE_INVENTORY="$RUNNER_TEMP/opencfd2606-early-stop-retention-base-ls-tree.txt"
          TARGET_INVENTORY="$RUNNER_TEMP/opencfd2606-early-stop-retention-target-ls-tree.txt"
          git cat-file -e "${BASE_REVISION}^{commit}"
          git cat-file -e "${GITHUB_SHA}^{commit}"
          git ls-tree -r --full-tree "$BASE_REVISION" >"$BASE_INVENTORY"
          git ls-tree -r --full-tree "$GITHUB_SHA" >"$TARGET_INVENTORY"
          printf '%s  %s\n' "$EXPECTED_BASE_INVENTORY_SHA256" "$BASE_INVENTORY" | sha256sum -c -
          TARGET_INVENTORY_SHA256="$(sha256sum "$TARGET_INVENTORY" | awk '{print $1}')"
          [[ "$TARGET_INVENTORY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          printf 'PENDING_CUTOVER_EARLY_STOP_RETENTION_TARGET_INVENTORY_SHA256=%s\n' "$TARGET_INVENTORY_SHA256" >>"$GITHUB_ENV"
          printf -v STAGING_Q '%q' "$VPS_STAGING_DIR"
          REMOTE_BASE="$VPS_STAGING_DIR/.codex-artifacts/opencfd2606-early-stop-retention-base-ls-tree.txt"
          REMOTE_TARGET="$VPS_STAGING_DIR/.codex-artifacts/opencfd2606-early-stop-retention-target-ls-tree.txt"
          printf -v REMOTE_BASE_Q '%q' "$REMOTE_BASE"
          printf -v REMOTE_TARGET_Q '%q' "$REMOTE_TARGET"
          ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "install -d -m 700 -- $STAGING_Q/.codex-artifacts && umask 077 && cat >$REMOTE_BASE_Q && chmod 600 -- $REMOTE_BASE_Q" \
            <"$BASE_INVENTORY"
          ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "umask 077 && cat >$REMOTE_TARGET_Q && chmod 600 -- $REMOTE_TARGET_Q" \
            <"$TARGET_INVENTORY"

      - name: Promote source or repair pending cutover under deploy lock
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="${VPS_APP_DIR:-/opt/airfoils-pro/app}"
          ORIGIN="${PUBLIC_ORIGIN:-https://airfoils.pro}"
          printf -v STAGING_Q '%q' "$VPS_STAGING_DIR"
          printf -v APP_Q '%q' "$APP_DIR"
          printf -v ORIGIN_Q '%q' "$ORIGIN"
          printf -v REVISION_Q '%q' "$GITHUB_SHA"
          RECOVERY_ACTIONS=0
          [[ "$PENDING_CUTOVER_NODE_API_REPAIR" == "true" ]] && RECOVERY_ACTIONS=$((RECOVERY_ACTIONS + 1))
          [[ "$PENDING_CUTOVER_ENGINE_REBUILD_REPLAY" == "true" ]] && RECOVERY_ACTIONS=$((RECOVERY_ACTIONS + 1))
          [[ "$PENDING_CUTOVER_RETENTION_RETRY" == "true" ]] && RECOVERY_ACTIONS=$((RECOVERY_ACTIONS + 1))
          [[ "$PENDING_CUTOVER_TRANSIENT_RETENTION_RETRY" == "true" ]] && RECOVERY_ACTIONS=$((RECOVERY_ACTIONS + 1))
          [[ "$PENDING_CUTOVER_EARLY_STOP_RETENTION_RETRY" == "true" ]] && RECOVERY_ACTIONS=$((RECOVERY_ACTIONS + 1))
          if ((RECOVERY_ACTIONS > 1)); then
            echo "Select only one pending-cutover recovery action per workflow dispatch." >&2
            exit 2
          fi
          if [[ "$PENDING_CUTOVER_EARLY_STOP_RETENTION_RETRY" == "true" ]]; then
            : "${PENDING_CUTOVER_EARLY_STOP_RETENTION_TARGET_INVENTORY_SHA256:?Target inventory SHA was not prepared}"
            printf -v TARGET_INVENTORY_SHA_Q '%q' "$PENDING_CUTOVER_EARLY_STOP_RETENTION_TARGET_INVENTORY_SHA256"
            ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" \
              -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
              "${VPS_USER}@${VPS_HOST}" \
              "chmod +x $STAGING_Q/scripts/deploy/retry-pending-opencfd2606-early-stop-retention.sh && STAGING_DIR=$STAGING_Q APP_DIR=$APP_Q EXPECTED_TARGET_SOURCE_REVISION=$REVISION_Q EXPECTED_TARGET_GIT_INVENTORY_SHA256=$TARGET_INVENTORY_SHA_Q $STAGING_Q/scripts/deploy/retry-pending-opencfd2606-early-stop-retention.sh"
          elif [[ "$PENDING_CUTOVER_TRANSIENT_RETENTION_RETRY" == "true" ]]; then
            : "${PENDING_CUTOVER_TRANSIENT_RETENTION_TARGET_INVENTORY_SHA256:?Target inventory SHA was not prepared}"
            printf -v TARGET_INVENTORY_SHA_Q '%q' "$PENDING_CUTOVER_TRANSIENT_RETENTION_TARGET_INVENTORY_SHA256"
            ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" \
              -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
              "${VPS_USER}@${VPS_HOST}" \
              "chmod +x $STAGING_Q/scripts/deploy/retry-pending-opencfd2606-transient-retention.sh && STAGING_DIR=$STAGING_Q APP_DIR=$APP_Q EXPECTED_TARGET_SOURCE_REVISION=$REVISION_Q EXPECTED_TARGET_GIT_INVENTORY_SHA256=$TARGET_INVENTORY_SHA_Q $STAGING_Q/scripts/deploy/retry-pending-opencfd2606-transient-retention.sh"
          elif [[ "$PENDING_CUTOVER_RETENTION_RETRY" == "true" ]]; then
            ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" \
              -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
              "${VPS_USER}@${VPS_HOST}" \
              "chmod +x $STAGING_Q/scripts/deploy/retry-pending-opencfd2606-retention.sh && STAGING_DIR=$STAGING_Q APP_DIR=$APP_Q EXPECTED_TARGET_SOURCE_REVISION=$REVISION_Q $STAGING_Q/scripts/deploy/retry-pending-opencfd2606-retention.sh"
          elif [[ "$PENDING_CUTOVER_ENGINE_REBUILD_REPLAY" == "true" ]]; then
            ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" \
              -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
              "${VPS_USER}@${VPS_HOST}" \
              "chmod +x $STAGING_Q/scripts/deploy/replay-pending-opencfd2606-rebuild.sh && STAGING_DIR=$STAGING_Q APP_DIR=$APP_Q EXPECTED_TARGET_SOURCE_REVISION=$REVISION_Q $STAGING_Q/scripts/deploy/replay-pending-opencfd2606-rebuild.sh"
          elif [[ "$PENDING_CUTOVER_NODE_API_REPAIR" == "true" ]]; then
            ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
              "chmod +x $STAGING_Q/scripts/deploy/repair-pending-node-api.sh && STAGING_DIR=$STAGING_Q APP_DIR=$APP_Q EXPECTED_TARGET_SOURCE_REVISION=$REVISION_Q $STAGING_Q/scripts/deploy/repair-pending-node-api.sh"
          else
            ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
              "chmod +x $STAGING_Q/scripts/deploy/promote-and-redeploy.sh && STAGING_DIR=$STAGING_Q APP_DIR=$APP_Q PUBLIC_ORIGIN=$ORIGIN_Q EXPECTED_SOURCE_REVISION=$REVISION_Q $STAGING_Q/scripts/deploy/promote-and-redeploy.sh"
          fi

      - name: Remove VPS staging payload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${VPS_STAGING_DIR:-}" ]]; then
            exit 0
          fi
          printf -v STAGING_Q '%q' "$VPS_STAGING_DIR"
          ssh -i ~/.ssh/airfoils_pro_vps -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "rm -rf -- $STAGING_Q"
